<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>粽子大作戰 🎋</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --bg:#F2EBE0;--surface:#FDF8F0;--card:#FFFFFF;
  --gl:#7AAF85;--g:#5A9468;--gd:#3A7450;
  --accent:#D4846A;--accent-l:#E8A898;
  --y:#D4A85A;--r:#C4624A;
  --cream:#3D2B1F;--text:#3D2B1F;--muted:#9A7E6E;
  --border:#E8D8C8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;background:var(--bg)}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);background-image:radial-gradient(circle,rgba(61,43,31,.055) 1px,transparent 1px);background-size:28px 28px;color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── SCREENS ── */
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-top:calc(env(safe-area-inset-top) + 24px);padding-bottom:calc(env(safe-area-inset-bottom) + 24px)}
.screen.hidden{display:none}

/* ── LOADING ── */
#scr-loading .spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#scr-loading p{color:var(--muted);font-size:14px}

/* ── WELCOME / CREATE ── */
.welcome-emoji{width:96px;height:112px;margin:0 auto 12px;display:block;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome-title{font-size:28px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px}
.welcome-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6}
.card-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:22px 20px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(61,43,31,.08)}
.card-box h3{font-size:14px;font-weight:800;color:var(--gl);margin-bottom:12px;letter-spacing:.5px}

/* members list on welcome */
.member-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.member-btn{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;cursor:pointer;transition:border-color .15s,background .15s;width:100%}
.member-btn:hover{border-color:var(--gl);background:rgba(122,175,133,.1)}
.member-btn.active{border-color:var(--g);background:rgba(90,148,104,.12)}
.member-icon{font-size:28px;width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;border:2px solid var(--border);flex-shrink:0}
.member-name{font-size:15px;font-weight:800;color:var(--text)}
.member-role{font-size:11px;color:var(--muted)}
.divider{text-align:center;font-size:11px;color:var(--muted);margin:12px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}

/* avatar grid */
.av-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.av-pick{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface);border:2px solid var(--border);cursor:pointer;gap:3px;transition:border-color .15s,background .15s;font-size:26px}
.av-pick:hover{border-color:var(--gl);background:rgba(122,175,133,.1)}
.av-pick.sel{border-color:var(--g);background:rgba(90,148,104,.15)}
.av-pick span{font-size:8px;color:var(--muted);font-weight:700}
.txt-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;margin-bottom:12px}
.txt-input:focus{border-color:var(--gl)}
.txt-input::placeholder{color:var(--muted)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:13px 0;cursor:pointer;letter-spacing:.5px;transition:filter .15s,transform .1s}
.btn-primary:hover{filter:brightness(1.08);transform:scale(1.01)}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{width:100%;background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;margin-top:8px;cursor:pointer;padding:6px}

/* ── MAIN APP ── */
.app-hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);padding:calc(env(safe-area-inset-top) + 14px) 18px 8px;text-align:center;box-shadow:0 8px 20px 4px var(--bg)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hdr-user{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer;transition:border-color .15s;box-shadow:0 2px 8px rgba(61,43,31,.08)}
.hdr-user:hover{border-color:var(--gl)}
.hdr-user-icon{font-size:20px}
.hdr-user-name{font-size:12px;font-weight:800;color:var(--text)}
.hdr-title-wrap{flex:1;text-align:center}
.hdr-title{font-size:20px;font-weight:900;color:var(--text)}
.hdr-sync{width:7px;height:7px;border-radius:50%;background:var(--border);display:inline-block;margin-left:4px;vertical-align:middle;transition:background .3s}
.hdr-sync.ok{background:var(--g)}.hdr-sync.err{background:var(--r)}.hdr-sync.loading{background:var(--y);animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.countdown{display:flex;justify-content:center;gap:8px;margin-bottom:6px}
.cd-block{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:4px 10px;text-align:center;box-shadow:0 2px 6px rgba(61,43,31,.06)}
.cd-num{font-size:16px;font-weight:900;color:var(--text)}
.cd-lab{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:1px}
.prog-wrap{margin:0 18px;background:var(--surface);border-radius:20px;height:8px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gd),var(--gl));border-radius:20px;transition:width 1s cubic-bezier(.4,0,.2,1);width:0%}
.prog-lbl{text-align:center;font-size:10px;color:var(--muted);margin-top:3px;margin-bottom:6px}

/* ── TRACK ── */
.track{padding:0 14px 120px;position:relative}
.track-line{position:absolute;left:50%;transform:translateX(-50%);top:0;bottom:0;width:2px;background:repeating-linear-gradient(to bottom,var(--border) 0 8px,transparent 8px 18px);z-index:0}
.sec-lbl{position:relative;z-index:2;display:flex;align-items:center;gap:8px;margin:24px 0 10px}
.sec-lbl::before,.sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.sec-lbl .sec-txt{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:var(--gl);letter-spacing:.5px;white-space:nowrap}
.sec-deco{opacity:0;display:inline-flex;align-items:center;line-height:0;flex-shrink:0;transition:opacity .45s .2s,transform .55s .2s cubic-bezier(.34,1.56,.64,1)}
.sec-deco:first-child{transform:translateX(-6px) rotate(-20deg) scale(0.5)}
.sec-deco:last-child{transform:translateX(6px) rotate(20deg) scale(0.5)}
.sec-lbl.visible .sec-deco{opacity:1;transform:translateX(0) rotate(0) scale(1)}

/* node row */
.node-row{display:flex;align-items:flex-start;position:relative;z-index:2;margin-bottom:16px}
.node-row.L{flex-direction:row}.node-row.R{flex-direction:row-reverse}
.tdot{width:14px;height:14px;border-radius:50%;border:3px solid var(--bg);flex-shrink:0;position:absolute;left:50%;transform:translate(-50%,18px);z-index:3}
.tdot.done{background:var(--g);box-shadow:0 0 8px rgba(90,148,104,.5)}.tdot.open{background:var(--y);box-shadow:0 0 6px rgba(212,168,90,.4)}
.task-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:12px 13px;width:calc(50% - 24px);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:0 2px 10px rgba(61,43,31,.06)}
.task-card.clickable{cursor:pointer}
.task-card.clickable:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(61,43,31,.12);border-color:var(--gl)}
.task-card.done{border-color:rgba(90,148,104,.4);background:rgba(90,148,104,.04)}
.node-row.L .task-card::after,.node-row.R .task-card::after{content:'';position:absolute;top:22px;height:2px;background:var(--border);width:24px}
.node-row.L .task-card::after{right:-24px}.node-row.R .task-card::after{left:-24px}
.task-emoji{font-size:24px;margin-bottom:4px;display:block}
.task-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:3px}
.task-detail{font-size:10px;color:var(--muted);line-height:1.5}
.task-tag{display:inline-block;margin-top:4px;border-radius:8px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:.5px}
.task-tag.p{background:rgba(212,168,90,.15);border:1px solid rgba(212,168,90,.3);color:#9A7218}
.task-tag.u{background:rgba(196,98,74,.12);border:1px solid rgba(196,98,74,.3);color:var(--r)}
.task-tag.g{background:rgba(90,148,104,.12);border:1px solid rgba(90,148,104,.3);color:var(--gd)}
.avatar-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.avatar-chip{display:flex;align-items:center;gap:3px;background:rgba(61,43,31,.06);border-radius:20px;padding:2px 7px 2px 3px;font-size:10px;color:var(--text)}
.avatar-fig{font-size:14px;width:20px;height:20px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.claim-btn{margin-top:8px;width:100%;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:11px;font-weight:800;padding:6px 0;cursor:pointer;letter-spacing:.4px;transition:filter .15s}
.claim-btn:hover{filter:brightness(1.08)}
.claim-btn.mine{background:rgba(90,148,104,.15);color:var(--gd);cursor:pointer;border:1px solid rgba(90,148,104,.3)}
.claim-btn.mine:hover{filter:brightness(1.05)}
.claim-btn.others{background:var(--surface);color:var(--muted);cursor:default;border:1px solid var(--border)}
.claim-btn.others:hover{filter:none}

/* ── SHOPPING ── */
.shop-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:14px;position:relative;z-index:2;margin-bottom:16px;box-shadow:0 2px 10px rgba(61,43,31,.06)}
.shop-title{font-size:13px;font-weight:900;color:var(--text);margin-bottom:10px}
.ing-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ing-item{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:9px 10px;transition:border-color .15s,transform .12s}
.ing-item.done{border-color:rgba(90,148,104,.5);background:rgba(90,148,104,.08)}
.ing-hdr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.ing-emoji{font-size:18px}
.ing-name{font-size:11px;font-weight:800;color:var(--text);flex:1;line-height:1.3}
.ing-check{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.ing-item.done .ing-check{background:var(--g);border-color:var(--g);color:#fff}
.ing-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.ing-chip{display:flex;align-items:center;gap:2px;background:rgba(61,43,31,.06);border-radius:12px;padding:1px 5px 1px 2px;font-size:9px;color:var(--text)}
.ing-claim-btn{width:100%;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:7px;color:#fff;font-family:inherit;font-size:10px;font-weight:800;padding:5px 0;cursor:pointer;margin-top:6px;transition:filter .15s}
.ing-claim-btn:hover{filter:brightness(1.08)}
.ing-claim-btn.mine{background:rgba(90,148,104,.15);color:var(--gd);cursor:pointer;border:1px solid rgba(90,148,104,.3)}
.ing-claim-btn.mine:hover{filter:brightness(1.05)}
.ing-claim-btn.others{background:var(--surface);color:var(--muted);cursor:default;border:1px solid var(--border)}
.ing-claim-btn.others:hover{filter:none}
/* add ingredient */
.add-sec{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.add-sec-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px}
.emoji-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.em-pick{font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:var(--surface);border:1.5px solid var(--border);cursor:pointer;transition:border-color .12s}
.em-pick:hover,.em-pick.sel{border-color:var(--gl);background:rgba(122,175,133,.12)}
.add-row{display:flex;gap:7px}
.add-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:12px;padding:7px 10px;outline:none}
.add-input:focus{border-color:var(--gl)}
.add-input::placeholder{color:var(--muted)}
.add-btn{background:var(--gd);border:none;border-radius:9px;color:#fff;font-size:18px;width:34px;cursor:pointer;flex-shrink:0;transition:filter .15s}
.add-btn:hover{filter:brightness(1.12)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(61,43,31,.5);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:22px 18px;max-width:310px;width:92%;transform:translateY(18px);transition:transform .22s;box-shadow:0 8px 32px rgba(61,43,31,.15)}
.modal-bg.show .modal{transform:translateY(0)}
.m-emoji{font-size:44px;text-align:center;margin-bottom:7px}
.m-title{font-size:17px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px}
.m-desc{font-size:11px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:14px}
.m-lbl{font-size:10px;font-weight:700;color:var(--gl);margin-bottom:5px;letter-spacing:.5px}
.m-confirm{width:100%;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:11px;color:#fff;font-family:inherit;font-size:13px;font-weight:800;padding:11px 0;cursor:pointer;transition:filter .15s}
.m-confirm:hover{filter:brightness(1.08)}
.m-close{width:100%;background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;margin-top:6px;cursor:pointer;padding:5px}

/* ── ESTIMATION BAR ── */
.est-bar{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;margin:0 18px 6px;box-shadow:0 2px 8px rgba(61,43,31,.06)}
.est-bar-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.est-title{font-size:10px;font-weight:700;color:var(--gl);letter-spacing:.5px}
.est-chevron{font-size:12px;color:var(--muted);transition:transform .25s;line-height:1}
.est-bar.open .est-chevron{transform:rotate(180deg)}
.est-list{display:flex;flex-direction:column;gap:5px;max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .3s ease,margin-top .3s ease;opacity:0;margin-top:0}
.est-bar.open .est-list{max-height:400px;opacity:1;margin-top:8px}
.est-row{display:flex;align-items:center;justify-content:space-between}
.est-ing{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text)}
.est-qty{font-size:11px;font-weight:800;color:var(--accent)}
.est-qty.dim{color:var(--muted);font-weight:400}

/* ── COUNT BAR ── */
.count-bar{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;margin:0 18px 6px;box-shadow:0 2px 8px rgba(61,43,31,.06)}
.count-title{font-size:10px;font-weight:700;color:var(--gl);letter-spacing:.5px;margin-bottom:8px}
.count-main{display:flex;align-items:center;justify-content:space-between;gap:10px}
.count-total-wrap{display:flex;flex-direction:column;gap:2px}
.count-total-num{font-size:26px;font-weight:900;color:var(--accent);line-height:1}
.count-total-lbl{font-size:10px;color:var(--muted)}
.count-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.count-chip{display:flex;align-items:center;gap:3px;background:rgba(61,43,31,.06);border-radius:12px;padding:2px 8px 2px 4px;font-size:11px;color:var(--text)}
.count-stepper{display:flex;align-items:center;gap:8px;flex-shrink:0}
.count-mine-lbl{font-size:10px;color:var(--muted);text-align:center;margin-bottom:2px}
.count-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;font-weight:800;line-height:1;flex-shrink:0}
.count-btn:hover{border-color:var(--gl);background:rgba(122,175,133,.12)}
.count-num{font-size:22px;font-weight:900;color:var(--text);min-width:28px;text-align:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(0);background:var(--gd);color:#fff;border-radius:18px;padding:9px 20px;font-size:12px;font-weight:700;z-index:300;opacity:0;transition:opacity .25s;white-space:nowrap;box-shadow:0 4px 20px rgba(61,43,31,.2);pointer-events:none}
.toast.show{opacity:1}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:400}

/* leaves */
.leaf{position:fixed;top:env(safe-area-inset-top);left:0;pointer-events:none;z-index:9999;opacity:.35;animation:drift linear infinite}
@keyframes drift{
  0%  {transform:translateY(-60px)  rotate(0)    translateX(0px)}
  25% {transform:translateY(28vh)   rotate(90deg) translateX(14px)}
  50% {transform:translateY(58vh)   rotate(180deg)translateX(-10px)}
  75% {transform:translateY(86vh)   rotate(270deg)translateX(10px)}
  100%{transform:translateY(114vh)  rotate(360deg)translateX(0px)}
}

/* ── SCROLL ANIMATIONS ── */
.fade-up{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .65s cubic-bezier(.34,1.3,.64,1)}
.fade-up.visible{opacity:1;transform:translateY(0)}
.slide-L{opacity:0;transform:translateX(-22px);transition:opacity .5s ease,transform .65s cubic-bezier(.34,1.3,.64,1)}
.slide-L.visible{opacity:1;transform:translateX(0)}
.slide-R{opacity:0;transform:translateX(22px);transition:opacity .5s ease,transform .65s cubic-bezier(.34,1.3,.64,1)}
.slide-R.visible{opacity:1;transform:translateX(0)}
/* ── BUTTON MICRO-FEEDBACK ── */
.count-btn:active{transform:scale(.82)}
.claim-btn:not(.mine):not(.others):active,.ing-claim-btn:not(.mine):not(.others):active{transform:scale(.96)}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<!-- ══ LOADING ══ -->
<div class="screen" id="scr-loading">
  <div class="spinner"></div>
  <p>連線中…</p>
</div>

<!-- ══ WELCOME ══ -->
<div class="screen hidden" id="scr-welcome">
  <div class="welcome-emoji">
    <svg viewBox="0 0 80 96" width="96" height="112" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 14C50 8 72 36 72 58C72 78 58 86 40 86C22 86 8 78 8 58C8 36 30 8 40 14Z" fill="#3A7450"/>
      <path d="M10 52C20 46 60 46 70 52L68 62C58 67 22 67 12 62Z" fill="#5A9468" opacity="0.55"/>
      <line x1="28" y1="44" x2="22" y2="66" stroke="#2E5E42" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <line x1="40" y1="40" x2="40" y2="68" stroke="#2E5E42" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <line x1="52" y1="44" x2="58" y2="66" stroke="#2E5E42" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <ellipse cx="26" cy="32" rx="8" ry="4" fill="#5A9468" opacity="0.25" transform="rotate(-20 26 32)"/>
      <path d="M34 14C34 7 37 4 40 4C43 4 46 7 46 14" stroke="#D4A85A" stroke-width="3.5" fill="none" stroke-linecap="round"/>

// ── API helpers ───────────────────────────────────────────────
function sync(dot){const d=document.getElementById('sync-dot');if(d)d.className='hdr-sync '+dot;}

// Apps Script 公開部署後 GET 自動帶 CORS，POST 用 form-encoded 避免 preflight
async function apiGet(){
  sync('loading');
  try{
    const r=await fetch(API_URL+'?action=getState&t='+Date.now());
    const d=await r.json();
    if(d.ok){
      if(d.state.ingredients) state.ingredients=d.state.ingredients;
      else state.ingredients=JSON.parse(JSON.stringify(DEFAULT_INGREDIENTS)).map(i=>({...i,claimants:[]}));
      if(d.state.tasks) state.tasks=d.state.tasks;
      if(d.state.counts) state.counts=d.state.counts;
      members=d.members||[];
      sync('ok');
    } else sync('err');
    return d;
  }catch(e){sync('err');throw e;}
}

// 用 GET + URLSearchParams 傳資料，避免 preflight CORS 問題
async function apiSet(key,value){
  sync('loading');
  try{
    const params=new URLSearchParams({action:'setState',key,value:JSON.stringify(value)});
    await fetch(API_URL+'?'+params.toString());
    sync('ok');
  }catch{sync('err');}
}

async function apiAddMember(name,icon){
  try{
    const params=new URLSearchParams({action:'addMember',name,icon});
    const r=await fetch(API_URL+'?'+params.toString());
    return r.json();
  }catch(e){return {ok:false,error:'network'};}
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  showScreen('scr-loading');
  // load saved me from localStorage
  const savedMe=localStorage.getItem('zongzi_me');
  if(savedMe) me=JSON.parse(savedMe);

  try{
    await apiGet();
  }catch{
    document.querySelector('#scr-loading p').textContent='⚠️ 連線失敗，請檢查網址設定';
    return;
  }

  if(me && members.some(m=>m.name===me.name)){
    enterApp();
  } else {
    me=null;
    showScreen('scr-welcome');
    renderWelcome();
  }
}

// ── WELCOME SCREEN ────────────────────────────────────────────
function renderWelcome(){
  // existing members
  const ml=document.getElementById('member-list');
  if(members.length===0){
    ml.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">還沒有人加入，先建立角色吧！</div>';
    document.getElementById('btn-select-member').style.display='none';
  } else {
    let selName=null;
    ml.innerHTML='';
    members.forEach(m=>{
      const btn=document.createElement('button');
      btn.className='member-btn';
      btn.innerHTML=`<div class="member-icon">${m.icon}</div><div><div class="member-name">${m.name}</div><div class="member-role">點選進入</div></div>`;
      btn.addEventListener('click',()=>{
        ml.querySelectorAll('.member-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        selName=m.name;
        document.getElementById('btn-select-member').style.display='block';
      });
      ml.appendChild(btn);
    });
    document.getElementById('btn-select-member').onclick=()=>{
      if(!selName)return;
      const found=members.find(m=>m.name===selName);
      if(found){ me={name:found.name,icon:found.icon}; localStorage.setItem('zongzi_me',JSON.stringify(me)); enterApp(); }
    };
  }

  // avatar picker for create
  const grid=document.getElementById('av-grid-create');
  grid.innerHTML=AVATARS.map((a,i)=>`<div class="av-pick" data-i="${i}">${a.icon}<span>${a.label}</span></div>`).join('');
  grid.querySelectorAll('.av-pick').forEach(el=>{
    el.addEventListener('click',()=>{
      grid.querySelectorAll('.av-pick').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      createAvatarSel=AVATARS[+el.dataset.i];
    });
  });

  document.getElementById('btn-create').onclick=createMember;
  document.getElementById('new-name-inp').onkeydown=e=>{if(e.key==='Enter')createMember();};
}

async function createMember(){
  if(!createAvatarSel){showToast('請先選個頭像 🎭');return;}
  const name=(document.getElementById('new-name-inp').value||'').trim();
  if(!name){showToast('請輸入名字 ✏️');return;}
  if(members.some(m=>m.name===name)){showToast('這個名字已經有人用了！');return;}
  const res=await apiAddMember(name,createAvatarSel.icon);
  if(res.ok){
    me={name,icon:createAvatarSel.icon};
    localStorage.setItem('zongzi_me',JSON.stringify(me));
    members.push({name,icon:createAvatarSel.icon});
    enterApp();
    showToast(`${createAvatarSel.icon} ${name} 加入了！歡迎 🎉`);
    launchConfetti();
  } else if(res.error==='name_exists'){
    showToast('這個名字已有人用了，換一個吧');
  }
}

// ── ENTER APP ────────────────────────────────────────────────
function enterApp(){
  showScreen('scr-app');
  document.getElementById('hdr-user-icon').textContent=me.icon;
  document.getElementById('hdr-user-name').textContent=me.name;
  document.getElementById('hdr-user').onclick=()=>{
    me=null; localStorage.removeItem('zongzi_me');
    clearInterval(pollTimer);
    showScreen('scr-welcome');
    renderWelcome();
  };
  document.getElementById('count-minus').onclick=()=>changeCount(-1);
  document.getElementById('count-plus').onclick=()=>changeCount(1);
  render();
  updateCountdown();
  setInterval(updateCountdown,60000);
  window.addEventListener('resize',syncTrackPadding);
  pollTimer=setInterval(async()=>{ try{ await apiGet(); render(); }catch{} },POLL_MS);
}

async function changeCount(delta){
  if(!state.counts) state.counts={};
  const cur=state.counts[me.name]||0;
  const next=Math.max(0,cur+delta);
  state.counts[me.name]=next;
  updateCountBar();
  await apiSet('counts',state.counts);
}

function updateEstimation(total){
  const list=document.getElementById('est-list');
  if(!list)return;
  if(!total){
    list.innerHTML='<div style="color:var(--muted);font-size:11px;text-align:center;padding:4px">先輸入包幾顆來估算 👆</div>';
    return;
  }
  list.innerHTML=EST_ITEMS.map(item=>{
    let qtyHtml;
    if(item.label){
      qtyHtml=`<span class="est-qty dim">${item.label}</span>`;
    } else {
      const raw=item.perUnit*total;
      let display;
      if(item.unit==='斤'){
        const v=Math.max(0.5,Math.round(raw*2)/2);
        display=v+' 斤'+(item.note?` <small style="color:var(--muted)">(${item.note})</small>`:'');
      } else {
        display=Math.max(1,Math.ceil(raw))+' '+item.unit;
      }
      qtyHtml=`<span class="est-qty">${display}</span>`;
    }
    return `<div class="est-row"><span class="est-ing"><span>${item.emoji}</span>${item.name}</span>${qtyHtml}</div>`;
  }).join('');
}

function updateCountBar(){
  const counts=state.counts||{};
  const myCount=counts[me.name]||0;
  const total=Object.values(counts).reduce((a,b)=>a+(+b),0);
  document.getElementById('count-mine').textContent=myCount;
  document.getElementById('count-total').textContent=total;
  updateEstimation(total);
  const chips=document.getElementById('count-chips');
  chips.innerHTML=Object.entries(counts)
    .filter(([,v])=>v>0)
    .map(([n,v])=>{
      const m=members.find(x=>x.name===n);
      return `<div class="count-chip"><span>${m?m.icon:'🌿'}</span>${n} ${v}顆</div>`;
    }).join('');
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  if(!state.ingredients||state.ingredients.length===0)
    state.ingredients=JSON.parse(JSON.stringify(DEFAULT_INGREDIENTS)).map(i=>({...i,claimants:[]}));

  if(scrollObserver) scrollObserver.disconnect();
  scrollObserver=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');scrollObserver.unobserve(e.target);}});
  },{threshold:0.1});

  const root=document.getElementById('root');
  root.innerHTML='';

  // Section 0: Shopping
  const sec0El=mkSecLbl(SECTIONS[0].label);
  root.appendChild(sec0El);
  requestAnimationFrame(()=>requestAnimationFrame(()=>sec0El.classList.add('visible')));
  const shopCard=document.createElement('div');
  shopCard.className='shop-card';

  const ingGrid=document.createElement('div');
  ingGrid.className='ing-grid';
  state.ingredients.forEach(ing=>{
    const cl=ing.claimants||[];
    const isMine=cl.some(c=>c.name===me.name);
    const hasClaim=cl.length>0;
    const item=document.createElement('div');
    item.className='ing-item'+(hasClaim?' done':'');
    item.innerHTML=`
      <div class="ing-hdr">
        <span class="ing-emoji">${ing.emoji}</span>
        <span class="ing-name">${ing.name}</span>
        <div class="ing-check">${hasClaim?'✓':''}</div>
      </div>
      ${cl.length?`<div class="ing-chips">${cl.map(c=>`
        <div class="ing-chip">
          <span>${c.icon}</span>${c.name}${c.note?`<span style="color:var(--muted);margin-left:2px">・${c.note}</span>`:''}
        </div>`).join('')}</div>`:''}
      <button class="ing-claim-btn ${isMine?'mine':''}" data-id="${ing.id}">
        ${isMine?'✅ 我去買':'🙋 我也去買！'}
      </button>
    `;
    if(!isMine){
      item.querySelector('.ing-claim-btn').addEventListener('click',e=>{
        e.stopPropagation();
        openModal({type:'ingredient',id:ing.id,emoji:ing.emoji,name:ing.name,detail:'可以留言說你帶多少量！',showNote:true});
      });
    } else {
      item.querySelector('.ing-claim-btn').addEventListener('click',e=>{
        e.stopPropagation();
        openModal({type:'unclaim-ingredient',id:ing.id,emoji:ing.emoji,name:ing.name,detail:'確定要取消認領嗎？'});
      });
    }
    ingGrid.appendChild(item);
  });
  shopCard.appendChild(ingGrid);

  // add ingredient
  shopCard.insertAdjacentHTML('beforeend',`
    <div class="add-sec">
      <div class="add-sec-lbl">+ 補充食材</div>
      <div class="emoji-row" id="emoji-row"></div>
      <div class="add-row" style="margin-top:6px">
        <input class="add-input" id="add-inp" placeholder="食材名稱…" maxlength="12">
        <button class="add-btn" id="add-btn">＋</button>
      </div>
    </div>
  `);
  shopCard.classList.add('fade-up');
  root.appendChild(shopCard);
  scrollObserver.observe(shopCard);

  const emojiRow=shopCard.querySelector('#emoji-row');
  ING_EMOJIS.forEach(em=>{
    const ep=document.createElement('div');
    ep.className='em-pick'+(em===addEmojiSel?' sel':'');
    ep.textContent=em;
    ep.addEventListener('click',()=>{addEmojiSel=em;emojiRow.querySelectorAll('.em-pick').forEach(x=>x.classList.remove('sel'));ep.classList.add('sel');});
    emojiRow.appendChild(ep);
  });
  shopCard.querySelector('#add-btn').addEventListener('click',addIngredient);
  shopCard.querySelector('#add-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addIngredient();});

  // Sections 1–4: Tasks
  let nodeIdx=0;
  [1,2,3,4].forEach(secId=>{
    const secEl=mkSecLbl(SECTIONS[secId].label);
    secEl.classList.add('fade-up');
    root.appendChild(secEl);
    scrollObserver.observe(secEl);
    TASKS.filter(t=>t.sec===secId).forEach(task=>{
      const cl=state.tasks[task.id]||[];
      const isMine=cl.some(c=>c.name===me.name);
      const hasClaim=cl.length>0;
      const side=nodeIdx%2===0?'L':'R'; nodeIdx++;
      const row=document.createElement('div');
      row.className=`node-row ${side}`;
      const dot=document.createElement('div');
      dot.className=`tdot ${hasClaim?'done':'open'}`;
      const card=document.createElement('div');
      card.className=`task-card${!isMine&&!hasClaim?' clickable':''}${hasClaim?' done':''}`;
      card.innerHTML=`
        <span class="task-emoji">${task.emoji}</span>
        <div class="task-name">${task.name}</div>
        <div class="task-detail">${task.detail}</div>
        ${task.tag?`<span class="task-tag ${task.tagType}">${task.tag}</span>`:''}
        ${cl.length?`<div class="avatar-row">${cl.map(c=>`<div class="avatar-chip"><div class="avatar-fig">${c.icon}</div>${c.name}</div>`).join('')}</div>`:''}
        <button class="claim-btn ${isMine?'mine':hasClaim?'others':''}" data-id="${task.id}">
          ${isMine?'✅ 我認領了':''}${!isMine&&hasClaim?'已有人認領':''}${!hasClaim?'🙋 我來！':''}
        </button>
      `;
      if(!isMine&&!hasClaim){
        card.querySelector('.claim-btn').addEventListener('click',e=>{
          e.stopPropagation();
          openModal({type:'task',id:task.id,emoji:task.emoji,name:task.name,detail:task.detail});
        });
      } else if(isMine){
        card.querySelector('.claim-btn').addEventListener('click',e=>{
          e.stopPropagation();
          openModal({type:'unclaim-task',id:task.id,emoji:task.emoji,name:task.name,detail:'確定要取消認領嗎？'});
        });
      }
      card.classList.add(side==='L'?'slide-L':'slide-R');
      if(side==='L'){row.appendChild(card);row.appendChild(dot);}
      else{row.appendChild(dot);row.appendChild(card);}
      root.appendChild(row);
      scrollObserver.observe(card);
    });
  });

  updateProgress();
  updateCountBar();
  requestAnimationFrame(syncTrackPadding);
}

function syncTrackPadding(){
  const hdr=document.querySelector('.app-hdr');
  const track=document.getElementById('track');
  if(hdr&&track) track.style.paddingTop=hdr.offsetHeight+'px';
}

function mkSecLbl(text){
  const LEAF=`<svg width="10" height="24" viewBox="0 0 10 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 1C7 4 9 10 8 17C7 22 5 23 5 23C5 23 3 22 2 17C1 10 3 4 5 1Z" fill="#7AAF85"/><line x1="5" y1="2" x2="5" y2="22" stroke="#5A9468" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/></svg>`;
  const d=document.createElement('div');d.className='sec-lbl';
  d.innerHTML=`<span class="sec-deco">${LEAF}</span><span class="sec-txt">${text}</span><span class="sec-deco">${LEAF}</span>`;
  return d;
}

function updateProgress(){
  const ingDone=state.ingredients.filter(i=>(i.claimants||[]).length>0).length;
  const taskDone=TASKS.filter(t=>(state.tasks[t.id]||[]).length>0).length;
  const done=ingDone+taskDone;
  const total=state.ingredients.length+TASKS.length;
  const pct=Math.round(done/total*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent=`已認領 ${done} / ${total} 項（${pct}%）`;
}

// ── ADD INGREDIENT ────────────────────────────────────────────
async function addIngredient(){
  const inp=document.getElementById('add-inp');
  const name=(inp.value||'').trim();
  if(!name){showToast('請輸入食材名稱');return;}
  if(state.ingredients.some(i=>i.name===name)){showToast('已經在清單了！');return;}
  const newIng={id:'i_'+Date.now(),emoji:addEmojiSel,name,claimants:[]};
  state.ingredients.push(newIng);
  inp.value='';
  await apiSet('ingredients',state.ingredients);
  render();
  showToast(`${addEmojiSel} ${name} 已加入！`);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(ctx){
  modalCtx=ctx;
  document.getElementById('m-emoji').textContent=ctx.emoji;
  document.getElementById('m-title').textContent=ctx.name;
  document.getElementById('m-desc').textContent=ctx.detail;
  document.getElementById('m-note-inp').value='';
  document.getElementById('m-note-wrap').style.display=ctx.showNote?'block':'none';
  const isUnclaim=ctx.type==='unclaim-ingredient'||ctx.type==='unclaim-task';
  const confirmBtn=document.getElementById('m-confirm');
  confirmBtn.textContent=isUnclaim?'❌ 確認取消認領':'✅ 確認認領！';
  confirmBtn.style.background=isUnclaim?'linear-gradient(135deg,#b71c1c,var(--r))':'';
  document.getElementById('modal-bg').classList.add('show');
}
document.getElementById('m-close').addEventListener('click',closeModal);
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
function closeModal(){document.getElementById('modal-bg').classList.remove('show');modalCtx=null;}

document.getElementById('m-confirm').addEventListener('click',async()=>{
  if(!modalCtx||!me)return;
  const note=(document.getElementById('m-note-inp').value||'').trim();
  if(modalCtx.type==='ingredient'){
    const ing=state.ingredients.find(i=>i.id===modalCtx.id);
    if(!ing)return;
    if(!ing.claimants)ing.claimants=[];
    if(ing.claimants.some(c=>c.name===me.name)){showToast('你已認領了！');closeModal();return;}
    ing.claimants.push({icon:me.icon,name:me.name,note});
    closeModal();
    await apiSet('ingredients',state.ingredients);
    render();
    showToast(`${me.icon} ${me.name} 認領成功！🎉`);
    launchConfetti();
  } else if(modalCtx.type==='unclaim-ingredient'){
    const ing=state.ingredients.find(i=>i.id===modalCtx.id);
    if(!ing)return;
    ing.claimants=(ing.claimants||[]).filter(c=>c.name!==me.name);
    closeModal();
    await apiSet('ingredients',state.ingredients);
    render();
    showToast(`已取消認領 ${ing.emoji} ${ing.name}`);
  } else if(modalCtx.type==='task'){
    if(!state.tasks[modalCtx.id])state.tasks[modalCtx.id]=[];
    if(state.tasks[modalCtx.id].some(c=>c.name===me.name)){showToast('你已認領了！');closeModal();return;}
    state.tasks[modalCtx.id].push({icon:me.icon,name:me.name});
    closeModal();
    await apiSet('tasks',state.tasks);
    render();
    showToast(`${me.icon} ${me.name} 認領成功！🎉`);
    launchConfetti();
  } else if(modalCtx.type==='unclaim-task'){
    state.tasks[modalCtx.id]=(state.tasks[modalCtx.id]||[]).filter(c=>c.name!==me.name);
    closeModal();
    await apiSet('tasks',state.tasks);
    render();
    showToast(`已取消認領 ${modalCtx.emoji} ${modalCtx.name}`);
  }
});

// ── COUNTDOWN ────────────────────────────────────────────────
function updateCountdown(){
  const target=new Date('2025-05-31T08:00:00');
  const now=new Date();
  const diff=target-now;
  const el=document.getElementById('countdown');
  if(!el)return;
  if(diff<=0){el.innerHTML='<div style="color:var(--gl);font-weight:800;font-size:13px">🎉 今天就是包粽日！</div>';return;}
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
  el.innerHTML=[{n:d,l:'天'},{n:h,l:'時'},{n:m,l:'分'}].map(x=>`<div class="cd-block"><div class="cd-num">${x.n}</div><div class="cd-lab">${x.l}</div></div>`).join('');
}

// ── SCREEN SWITCH ─────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.add('hidden');s.style.display='none';});
  const el=document.getElementById(id);
  el.classList.remove('hidden');
  el.style.display='flex';
}

// ── TOAST + CONFETTI ─────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function launchConfetti(){const cv=document.getElementById('confetti');const ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const p=Array.from({length:70},()=>({x:Math.random()*cv.width,y:-10,r:4+Math.random()*5,d:Math.random()*80,color:['#4caf50','#ffd54f','#ff8f00','#7bc67e','#fff9ec'][Math.floor(Math.random()*5)],tilt:0,tiltAngle:0,tai:Math.random()*.07+.05}));let f=0;function draw(){ctx.clearRect(0,0,cv.width,cv.height);p.forEach(q=>{q.tiltAngle+=q.tai;q.y+=3+Math.sin(q.d);q.tilt=Math.sin(q.tiltAngle)*15;ctx.beginPath();ctx.lineWidth=q.r;ctx.strokeStyle=q.color;ctx.moveTo(q.x+q.tilt+q.r/2,q.y);ctx.lineTo(q.x+q.tilt,q.y+q.tilt+q.r/2);ctx.stroke();});if(++f<120)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);}draw();}

// ── START ────────────────────────────────────────────────────
init();
</script>
</body>
