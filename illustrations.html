<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粽子大作戰 — 插圖元件</title>
<style>
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:#F2EBE0;color:#3D2B1F;margin:0;padding:24px}
h1{font-size:20px;font-weight:900;margin-bottom:4px}
.sub{font-size:12px;color:#9A7E6E;margin-bottom:32px}
.section{margin-bottom:40px}
.section-title{font-size:11px;font-weight:800;color:#7AAF85;letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px;padding-bottom:6px;border-bottom:1px solid #E8D8C8}
.grid{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:8px}
.item-label{font-size:10px;color:#9A7E6E;font-weight:700;text-align:center}
.item-size{font-size:9px;color:#C8B8A8}
.bg-dark{background:#3A7450;border-radius:12px;padding:12px}
.swatch-row{display:flex;flex-wrap:wrap;gap:12px}
.swatch{width:56px;height:56px;border-radius:10px;border:1px solid rgba(0,0,0,.08)}
.swatch-name{font-size:9px;color:#9A7E6E;margin-top:4px;text-align:center}
.swatch-hex{font-size:8px;color:#C8B8A8;text-align:center}
</style>
</head>
<body>

<h1>🎋 插圖元件庫</h1>
<div class="sub">粽子大作戰 — 所有 SVG 插圖一覽</div>

<!-- ══ 主角 ══ -->
<div class="section">
  <div class="section-title">主角 — 粽子角色</div>
  <div class="grid">

    <div class="item">
      <svg viewBox="0 0 80 96" width="96" height="112" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 14C55 14 68 29 68 47C68 65 58 84 40 84C22 84 12 65 12 47C12 29 25 14 40 14Z" fill="#3A7450"/>
        <path d="M14 42C22 36 58 36 66 42L64 52C56 57 24 57 16 52Z" fill="#5A9468" opacity="0.55"/>
        <line x1="28" y1="37" x2="24" y2="56" stroke="#2E5E42" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <line x1="40" y1="36" x2="40" y2="57" stroke="#2E5E42" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <line x1="52" y1="37" x2="56" y2="56" stroke="#2E5E42" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <ellipse cx="30" cy="30" rx="7" ry="4" fill="#5A9468" opacity="0.25" transform="rotate(-20 30 30)"/>
        <path d="M30 16C30 8 34 5 40 5C46 5 50 8 50 16" stroke="#D4A85A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <circle cx="40" cy="4" r="5.5" fill="#D4A85A"/>
        <circle cx="32" cy="55" r="4.5" fill="#FDF8F0"/>
        <circle cx="48" cy="55" r="4.5" fill="#FDF8F0"/>
        <circle cx="33" cy="56" r="2.5" fill="#3D2B1F"/>
        <circle cx="49" cy="56" r="2.5" fill="#3D2B1F"/>
        <circle cx="34" cy="55" r="1" fill="#FDF8F0"/>
        <circle cx="50" cy="55" r="1" fill="#FDF8F0"/>
        <ellipse cx="25" cy="62" rx="6" ry="3.5" fill="#D4846A" opacity="0.35"/>
        <ellipse cx="55" cy="62" rx="6" ry="3.5" fill="#D4846A" opacity="0.35"/>
        <path d="M33 67Q40 74 47 67" stroke="#FDF8F0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="item-label">歡迎頁主角</div>
      <div class="item-size">96 × 112</div>
    </div>

    <div class="item">
      <svg viewBox="0 0 44 54" width="88" height="108" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 8C30 8 37 16 37 28C37 40 31 50 22 50C13 50 7 40 7 28C7 16 14 8 22 8Z" fill="#3A7450"/>
        <path d="M8 26C13 22 31 22 36 26L35 32C30 36 14 36 9 32Z" fill="#5A9468" opacity="0.5"/>
        <path d="M16 10C16 6 18 4 22 4C26 4 28 6 28 10" stroke="#D4A85A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="22" cy="3" r="3.5" fill="#D4A85A"/>
        <circle cx="17" cy="33" r="2.5" fill="#FDF8F0"/>
        <circle cx="27" cy="33" r="2.5" fill="#FDF8F0"/>
        <path d="M18 39Q22 43 26 39" stroke="#FDF8F0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="item-label">浮動粽子（大）</div>
      <div class="item-size">44 × 54</div>
    </div>

    <div class="item">
      <svg viewBox="0 0 44 54" width="44" height="54" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 8C30 8 37 16 37 28C37 40 31 50 22 50C13 50 7 40 7 28C7 16 14 8 22 8Z" fill="#3A7450"/>
        <path d="M8 26C13 22 31 22 36 26L35 32C30 36 14 36 9 32Z" fill="#5A9468" opacity="0.5"/>
        <path d="M16 10C16 6 18 4 22 4C26 4 28 6 28 10" stroke="#D4A85A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="22" cy="3" r="3.5" fill="#D4A85A"/>
        <circle cx="17" cy="33" r="2.5" fill="#FDF8F0"/>
        <circle cx="27" cy="33" r="2.5" fill="#FDF8F0"/>
        <path d="M18 39Q22 43 26 39" stroke="#FDF8F0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="item-label">浮動粽子（實際尺寸）</div>
      <div class="item-size">44 × 54</div>
    </div>

  </div>
</div>

<!-- ══ 竹葉 ══ -->
<div class="section">
  <div class="section-title">裝飾元素 — 竹葉 & 米粒</div>
  <div class="grid" style="align-items:center">

    <div class="item">
      <svg viewBox="0 0 18 52" width="36" height="104" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 2C14 8 17 19 15 35C13 45 9 50 9 50C9 50 5 45 3 35C1 19 4 8 9 2Z" fill="#7AAF85"/>
        <line x1="9" y1="5" x2="9" y2="47" stroke="#5A9468" stroke-width="1.2" opacity="0.45" stroke-linecap="round"/>
      </svg>
      <div class="item-label">細竹葉（霧綠）</div>
      <div class="item-size">18 × 52</div>
    </div>

    <div class="item">
      <svg viewBox="0 0 24 44" width="48" height="88" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C19 7 22 18 20 32C18 41 12 43 12 43C12 43 6 41 4 32C2 18 5 7 12 2Z" fill="#5A9468"/>
        <line x1="12" y1="5" x2="12" y2="40" stroke="#3A7450" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
      </svg>
      <div class="item-label">寬竹葉（深綠）</div>
      <div class="item-size">24 × 44</div>
    </div>

    <div class="item">
      <div class="bg-dark">
        <svg viewBox="0 0 18 52" width="18" height="52" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2C14 8 17 19 15 35C13 45 9 50 9 50C9 50 5 45 3 35C1 19 4 8 9 2Z" fill="#7AAF85"/>
          <line x1="9" y1="5" x2="9" y2="47" stroke="#5A9468" stroke-width="1.2" opacity="0.45" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="item-label">深色背景效果</div>
    </div>

    <div class="item">
      <svg viewBox="0 0 30 16" width="90" height="48" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="6" cy="8" rx="5" ry="2.5" fill="#3D2B1F" transform="rotate(-20 6 8)" opacity="0.5"/>
        <ellipse cx="15" cy="6" rx="5" ry="2.5" fill="#3D2B1F" transform="rotate(10 15 6)" opacity="0.5"/>
        <ellipse cx="24" cy="10" rx="5" ry="2.5" fill="#3D2B1F" transform="rotate(-15 24 10)" opacity="0.5"/>
      </svg>
      <div class="item-label">米粒堆（深色）</div>
      <div class="item-size">30 × 16</div>
    </div>

    <div class="item">
      <div style="background:#3A7450;border-radius:12px;padding:12px">
        <svg viewBox="0 0 30 16" width="90" height="48" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="6" cy="8" rx="5" ry="2.5" fill="#F2EBE0" transform="rotate(-20 6 8)" opacity="0.9"/>
          <ellipse cx="15" cy="6" rx="5" ry="2.5" fill="#F2EBE0" transform="rotate(10 15 6)" opacity="0.9"/>
          <ellipse cx="24" cy="10" rx="5" ry="2.5" fill="#F2EBE0" transform="rotate(-15 24 10)" opacity="0.9"/>
        </svg>
      </div>
      <div class="item-label">米粒堆（淺色）</div>
    </div>

  </div>
</div>

<!-- ══ 色票 ══ -->
<div class="section">
  <div class="section-title">色票</div>
  <div class="swatch-row">
    <div class="item">
      <div class="swatch" style="background:#F2EBE0;border:1.5px solid #E8D8C8"></div>
      <div class="swatch-name">背景</div>
      <div class="swatch-hex">#F2EBE0</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#FDF8F0"></div>
      <div class="swatch-name">次背景</div>
      <div class="swatch-hex">#FDF8F0</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#7AAF85"></div>
      <div class="swatch-name">霧綠</div>
      <div class="swatch-hex">#7AAF85</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#5A9468"></div>
      <div class="swatch-name">中綠</div>
      <div class="swatch-hex">#5A9468</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#3A7450"></div>
      <div class="swatch-name">深竹綠</div>
      <div class="swatch-hex">#3A7450</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#D4846A"></div>
      <div class="swatch-name">磚橘</div>
      <div class="swatch-hex">#D4846A</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#D4A85A"></div>
      <div class="swatch-name">蜂蜜黃</div>
      <div class="swatch-hex">#D4A85A</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#3D2B1F"></div>
      <div class="swatch-name">深暖棕</div>
      <div class="swatch-hex">#3D2B1F</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#9A7E6E"></div>
      <div class="swatch-name">暖灰棕</div>
      <div class="swatch-hex">#9A7E6E</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#E8D8C8"></div>
      <div class="swatch-name">暖米邊框</div>
      <div class="swatch-hex">#E8D8C8</div>
    </div>
  </div>
</div>

</body>
</html>
